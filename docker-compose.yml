services:
  cloud:
    build:
      context: .
      dockerfile: Dockerfile
    image: posixfy-cloud
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      - API_KEY=${API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FILEBRIDGE_URL=http://bridge:3000
      - LISTEN_ADDR=0.0.0.0:8080
      - DB_PATH=/data/posixfy-cloud.db
      - ADMIN_INIT_PASSWORD=${ADMIN_INIT_PASSWORD:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - cloud-data:/data
    depends_on:
      bridge:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # Posixfy Cloud requires a running Posixfy Bridge instance.
  # Uncomment below to start one automatically, or provide your own.
  # bridge:
  #   image: ghcr.io/posixfy/posixfy-bridge:latest
  #   restart: unless-stopped
  #   environment:
  #     - API_KEY=${API_KEY}
  #     - MOUNT_POINTS=${MOUNT_POINTS}
  #     - RUST_LOG=${RUST_LOG:-info}
  #   volumes:
  #     - /path/to/data:/data
  #   networks:
  #     - internal
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
  #     interval: 30s
  #     timeout: 3s
  #     start_period: 5s
  #     retries: 3

volumes:
  cloud-data:

networks:
  internal:
    driver: bridge
